# ============================================================================
# Workflow: Build and Deploy CI Dashboard to GitHub Pages
# ============================================================================
#
# PURPOSE:
#   Reads collected CI data from the gh-pages-ci-hub branch, generates
#   a static HTML dashboard, and deploys it to GitHub Pages.
#
# PREREQUISITES:
#   • GitHub Pages must be enabled (Settings → Pages → Source: GitHub Actions)
#   • Data must have been collected by collect-results.yml at least once
# ============================================================================

name: deploy-dashboard

on:
  workflow_dispatch:           # Called by collect-results.yml, also manually triggerable

permissions:
  contents: read
  pages: write
  id-token: write              # Required for GitHub Pages deployment action

concurrency:
  group: pages-deploy
  cancel-in-progress: false    # Queue deployments; never cancel mid-deploy

jobs:
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    outputs:
      pages-enabled: ${{ steps.pages.outputs.enabled }}

    steps:
      - name: Checkout ci-hub (scripts + config)
        uses: actions/checkout@v4
        with:
          path: ci-hub

      - name: Restore data store from gh-pages-ci-hub
        uses: actions/checkout@v4
        with:
          ref: gh-pages-ci-hub
          path: data-store
        continue-on-error: true

      - name: Install Python dependencies
        run: pip install jinja2 pyyaml

      - name: Generate dashboard HTML
        run: |
          mkdir -p site
          python3 ci-hub/.github/scripts/generate_dashboard.py \
            --repos-config ci-hub/config/repos.yml \
            --data-dir     data-store/data \
            --output-dir   site

      - name: Check GitHub Pages availability
        id: pages
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning title=GitHub Pages unavailable::Dashboard HTML was generated, but Pages is not enabled or not supported for this repository plan."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: needs.build.outputs.pages-enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
