      target:   "cv64a6_imafdc_sv39_hpdcache_wb"
      testcase: "dv-riscv-compliance"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39_hpdcache.yaml"
    secrets: inherit
