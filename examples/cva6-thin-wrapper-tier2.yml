# ============================================================================
# CVA6 Thin Wrapper — Tier 2 Full Coverage
# ============================================================================
#
# INSTRUCTIONS:
#   1. Copy to AlexChenIC/cva6/.github/workflows/tier2.yml
#   2. Replace AlexChenIC with your GitHub username.
#
# WHAT THIS DOES:
#   Runs the full testlist (no --test filter) for all active configs.
#   Triggered nightly by ci-hub's trigger-nightly.yml, or manually.
#   NOT a PR gate — too slow for that purpose.
# ============================================================================

name: CVA6 Tier2 Full Coverage

on:
  workflow_dispatch:           # Triggered by ci-hub's trigger-nightly.yml
  # schedule:
  #   - cron: '0 3 * * *'    # Uncomment to also run independently each night

concurrency:
  group: cva6-tier2-${{ github.ref }}
  cancel-in-progress: false   # Let full runs complete

jobs:

  # ── cv32a65x ─────────────────────────────────────────────────────────
  tier2-cv32a65x-cv32a6-tests:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a65x"
      testcase: "cv32a6_tests"
      mode:     "script"
    secrets: inherit

  tier2-cv32a65x-arch-test:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a65x"
      testcase: "dv-riscv-arch-test"
      mode:     "testlist"
      install-script: "install-riscv-arch-test"
      testlist: "../tests/testlist_riscv-arch-test-cv32a65x.yaml"
      linker:   "../tests/riscv-arch-test/riscv-target/spike/link.ld"
    secrets: inherit

  tier2-cv32a65x-compliance:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a65x"
      testcase: "dv-riscv-compliance"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-compliance-cv32a65x.yaml"
    secrets: inherit

  tier2-cv32a65x-riscv-tests-p:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a65x"
      testcase: "dv-riscv-tests-p"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
    secrets: inherit

  # ── cv32a60x ─────────────────────────────────────────────────────────
  tier2-cv32a60x-arch-test:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a60x"
      testcase: "dv-riscv-arch-test"
      mode:     "testlist"
      install-script: "install-riscv-arch-test"
      testlist: "../tests/testlist_riscv-arch-test-cv32a60x.yaml"
      linker:   "../tests/riscv-arch-test/riscv-target/spike/link.ld"
    secrets: inherit

  tier2-cv32a60x-compliance:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a60x"
      testcase: "dv-riscv-compliance"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-compliance-cv32a60x.yaml"
    secrets: inherit

  tier2-cv32a60x-riscv-tests-p:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV32"
      target:   "cv32a60x"
      testcase: "dv-riscv-tests-p"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-tests-cv32a60x-p.yaml"
    secrets: inherit

  # ── cv64a6_imafdc_sv39_hpdcache_wb ──────────────────────────────────
  tier2-hpdcache-arch-test:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV64"
      target:   "cv64a6_imafdc_sv39_hpdcache_wb"
      testcase: "dv-riscv-arch-test"
      mode:     "testlist"
      install-script: "install-riscv-arch-test"
      testlist: "../tests/testlist_riscv-arch-test-cv64a6_imafdc_sv39_hpdcache.yaml"
      linker:   "../tests/riscv-arch-test/riscv-target/spike/link.ld"
    secrets: inherit

  tier2-hpdcache-tests-v:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch:     "RV64"
      target:   "cv64a6_imafdc_sv39_hpdcache_wb"
      testcase: "dv-riscv-tests-v"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39_hpdcache-v.yaml"
    secrets: inherit

  tier2-hpdcache-tests-p:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
