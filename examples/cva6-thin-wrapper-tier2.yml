# ============================================================================
# CVA6 Thin Wrapper - Tier 2 Full Coverage
# ============================================================================
#
# INSTRUCTIONS:
#   1. Copy to AlexChenIC/cva6/.github/workflows/tier2.yml.
#   2. Replace AlexChenIC with your GitHub username or organization.
#
# WHAT THIS DOES:
#   Runs the same 22-job Tier 2 matrix currently validated in
#   AlexChenIC/cva6-tier-ci-test-20260427. All execution logic lives in
#   AlexChenIC/openhw_ci_hub-dev; this wrapper only declares what to run.
# ============================================================================

name: CVA6 Tier2 Full Coverage

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *"

concurrency:
  group: cva6-tier2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # cv32a65x
  tier2-cv32a65x-smoke:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch: "RV32"
      target: "cv32a65x"
      testcase: "smoke-tests-cv32a65x"
      mode: "script"
      simulator: "veri-testharness,spike"
    secrets: inherit

  tier2-cv32a65x-cv32a6-tests:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch: "RV32"
      target: "cv32a65x"
      testcase: "cv32a6_tests"
      mode: "script"
      simulator: "veri-testharness,spike"
    secrets: inherit

  tier2-cv32a65x-arch-test:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch: "RV32"
      target: "cv32a65x"
      testcase: "dv-riscv-arch-test"
      mode: "testlist"
      simulator: "veri-testharness,spike"
      install-script: "install-riscv-arch-test"
      testlist: "../tests/testlist_riscv-arch-test-cv32a65x.yaml"
      linker: "../tests/riscv-arch-test/riscv-target/spike/link.ld"
    secrets: inherit

  tier2-cv32a65x-riscv-tests-p:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch: "RV32"
      target: "cv32a65x"
      testcase: "dv-riscv-tests-p"
      mode: "testlist"
      simulator: "veri-testharness,spike"
      install-script: "install-riscv-tests"
      testlist: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
    secrets: inherit

  tier2-cv32a65x-compliance:
    uses: "AlexChenIC/openhw_ci_hub-dev/.github/workflows/riscv-tier2.yml@main"
    with:
      arch: "RV32"
      target: "cv32a65x"
      testcase: "dv-riscv-compliance"
      mode: "testlist"
      simulator: "veri-testharness,spike"
      install-script: "install-riscv-compliance"
