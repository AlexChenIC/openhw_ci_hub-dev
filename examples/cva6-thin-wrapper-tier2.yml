      testcase: "dv-riscv-tests-p"
      mode:     "testlist"
      testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39_hpdcache-p.yaml"
    secrets: inherit

  tier2-hpdcache-compliance:
