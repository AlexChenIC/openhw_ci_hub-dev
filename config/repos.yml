# OpenHW CI Hub — Repository Registry
#
# Each entry defines a repository to monitor and optionally run CI for.
#
# Fields:
#   owner         GitHub username or organisation (string)
#   repo          Repository name (string)
#   display_name  Human-readable name shown in the dashboard
#   description   Short description shown in dashboard tooltips
#   workflows     Map of workflow_key → workflow_filename_in_target_repo
#                 The key is used as the data file name: runs_{key}.json
#                 The filename must match the .github/workflows/*.yml in the target repo.
#   matrix_config Path to the matrix YAML for this repo (relative to ci-hub root)
#   active        Set to false to skip collection without deleting the entry
#
repos:

  # ── CVA6 — current tier CI validation repository ───────────────────────
  - owner: "AlexChenIC"
    repo:  "cva6-tier-ci-test-20260427"
    display_name: "CVA6 Tier CI Test"
    description: "CVA6 tiered CI validation repo — Verilator + Spike"
    workflows:
      ci: "ci.yml"
      riscv-tier1: "openhw-cva6-ci-tier1.yml"
      riscv-tier2: "openhw-cva6-ci-tier2.yml"
    matrix_config: "config/cva6-matrix.yml"
    active: true

  # ── CV32E20-DV — 32-bit RISC-V Verification Environment ────────────────
  - owner: "AlexChenIC"
    repo:  "cv32e20-dv"
    display_name: "CV32E20-DV (fork)"
    description: "32-bit RISC-V Verification Env — simulator TBD (see 07-cv32e20-integration.md)"
    workflows:
      riscv-tier1: "tier1.yml"
    matrix_config: "config/cv32e20-matrix.yml"
    active: false                   # Enable after Phase 3 simulator investigation
